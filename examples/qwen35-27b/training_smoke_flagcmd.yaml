# Qwen3.5-27B Smoke Test: Single Challenge (Flag Command)
# ==============================================================
# Validates full SkyRL GRPO pipeline with one very-easy challenge.
# Uses FP8 base model (auto-dequantized to BF16 for training).
# 2x high-memory GPUs (80GB+ each): GPU 0 vLLM (FP8), GPU 1 FSDP2 trainer (BF16).

model:
  name: "Qwen/Qwen3.5-27B"
  max_seq_length: 49152
  load_in_4bit: false
  load_in_8bit: false

lora:
  r: 64
  alpha: 128
  dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_rslora: false

sft:
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: cosine
  packing: false
  flash_attn: true

online_rl:
  epochs: 1
  difficulty_max: "master"
  batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  warmup_ratio: 0.10
  beta: 0.0
  loss_type: dapo
  # 4 generations for RLOO variance — with 2, both solving = zero advantage.
  # 140+ GB GPU can handle 4 concurrent generations within 65K context budget.
  num_generations: 4
  advantage_estimator: rloo
  max_completion_length: 3072
  max_tool_calling_iterations: 20
  # Shorter horizon for smoke test
  horizon_schedule:
    rounds: [20]
    step_interval: 4
  hard_mask_statuses:
    - infra_unreachable
    - target_mismatch
    - parser_error
    - tool_timeout
  positive_only_until_step: 120
  positive_only_reward_floor: 0.0
  max_samples_per_challenge: 1
  drop_static_challenges: true
  drop_unresolved_registry_samples: true
  # Port offset for remote GPU server SSH tunnels (32810 -> 43010)
  target_port_offset: 10200
  target_host_override: null
  target_map_path: null
  target_map_strict: false
  prefer_registry_target: true
  fail_on_target_collisions: true
  fail_on_flag_mismatch: true
  fail_on_missing_registry_flag: true
  # SMOKE TEST: only require the challenges present in the data file
  require_all_registry_challenges: false
  use_new_inference: true
  allow_new_inference_for_qwen35: true
  enable_prefix_caching: false
  enable_chunked_prefill: true
  enforce_eager: true
  max_prompt_length: 32768
  vllm_max_model_len: 65536
  vllm_language_model_only: true
  vllm_attention_backend: "TRITON_ATTN"
  max_grad_norm: 1.0
  epsilon_high: 0.28
  weight_decay: 0.1
  scale_rewards: false
  use_vllm: true
  vllm_mode: server
  vllm_server_url: null
  # High-memory GPU: FP8 model uses ~29GB, 64K context KV cache needs ~40GB
  gpu_memory_utilization: 0.80
  max_num_seqs: 8
  max_num_batched_tokens: 16384
  # Disabled: overlong filter zeros loss_mask when custom template adds
  # trailing \n after {% endgeneration %} (response[-1] != eos_token_id).
  # See Patch #22.  Safe to disable for retokenized multi-turn.
  apply_overlong_filtering: false
  max_env_workers: 4
  flash_attn: false
  use_sample_packing: false
  require_fast_linear_attention: true
  pytorch_cuda_alloc_conf: "expandable_segments:True"
  tool_call_format: qwen3_coder
  chat_template: "qwen3_without_thinking"
  chat_template_kwargs:
    enable_thinking: true
  # SkyRL's custom qwen3_without_thinking template does NOT have a
  # {% if tools %} block — passing tools via chat_template_kwargs silently
  # drops them.  Use text injection via _inject_tool_schemas() instead,
  # which adds explicit qwen3_coder XML format instructions to the system
  # message.  See Issue #38.
  native_tool_schemas: false
  zero_variance_filter: true
  dynamic_sampling:
    type: null  # DISABLED: crashes when ALL gens have same reward. zero_variance_filter handles loss masking safely.
    max_sample_batches: 10
  step_wise_trajectories: false
  allow_step_wise_with_custom_chat_template: false
  agent_class: trajgym.agent.default_agent.DefaultStepAgent
  agent_kwargs:
    max_consecutive_no_tool_calls: 2
    max_tool_response_chars: 2500
    runtime_cmd: "python src/trajgym/agent/framework_runtime_bridge.py"
    runtime_timeout_seconds: 20
    runtime_passthrough: false
    runtime_fallback_to_parser: false
    runtime_env:
      TRAJGYM_AGENT_FRAMEWORK: "boxpwnr_langgraph"
      TRAJGYM_AGENT_MODE: "tool_calls"

reward:
  flag_weight: 0.40
  efficiency_weight: 0.15
  progression_weight: 0.08
  exploration_weight: 0.05
  uniqueness_weight: 0.05
  format_weight: 0.10
  recovery_weight: 0.09
  cognitive_weight: 0.08
  hallucination_penalty: 0.20
  interaction_quality_weight: 0.10
  noise_range: 0.01
  exploration_gamma: 0.95
  use_gdpo: false

output:
  save_steps: 25
  logging_steps: 1
  report_to: tensorboard

online_rl_logging:
  enable_trajectory_logging: true
