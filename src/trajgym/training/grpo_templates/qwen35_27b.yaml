# SkyRL GRPO config for Qwen/Qwen3.5-27B (27B dense, local non-colocated vLLM)
# Matches SkyRLConfig dataclass schema.
# Used as reference — actual config is built by training/online_rl/runtime.py from training_qwen35_27b.yaml.
#
# Note: With LoRA enabled, keep run_engines_locally=true. Upstream SkyRL
# remote inference mode does not support LoRA adapter sync.

data:
  train_data:
    - outputs/skyrl_online_rl_data.jsonl

trainer:
  strategy: fsdp2
  bf16: true
  gradient_checkpointing: true
  flash_attn: true
  use_sample_packing: false
  seed: 42
  epochs: 1
  train_batch_size: 1
  micro_train_batch_size_per_gpu: 1
  max_prompt_length: 16384
  ckpt_path: outputs/online_rl
  ckpt_interval: 25
  export_path: outputs/online_rl/final
  log_path: outputs/online_rl/logs
  project_name: trajgym
  run_name: online-rl-qwen35-27b
  logger: none

  # Non-colocated local engines let trainer and generator use separate GPUs.
  placement:
    colocate_all: false

  ref:
    model:
      path: outputs/sft_qwen35_merged/

  policy:
    model:
      path: outputs/sft_qwen35_merged/
      lora:
        rank: 64
        alpha: 128
        dropout: 0.0
        target_modules:
          - q_proj
          - k_proj
          - v_proj
          - o_proj
          - gate_proj
          - up_proj
          - down_proj
    optimizer_config:
      lr: 5.0e-6
      weight_decay: 0.0
      max_grad_norm: 5.0

  algorithm:
    advantage_estimator: rloo
    policy_loss_type: regular
    kl_loss_coef: 0.0
    use_kl_loss: false
    loss_reduction: token_mean
    eps_clip_low: 0.2
    eps_clip_high: 0.28

generator:
  model_dtype: bfloat16
  backend: vllm
  run_engines_locally: true
  num_inference_engines: 1
  weight_sync_backend: nccl
  # 4 samples per prompt (memory-efficient for 27B).
  n_samples_per_prompt: 4
  max_input_length: 16384
  max_turns: 40
  inference_engine_tensor_parallel_size: 1
  gpu_memory_utilization: 0.70
  max_num_seqs: 8
  max_num_batched_tokens: 16384
  enable_prefix_caching: true
  enable_chunked_prefill: true
  engine_init_kwargs:
    max_model_len: 24576
    language_model_only: true
  # Thinking mode: qwen3_without_thinking strips thinking from history turns,
  # preserves on final turn (included in loss). Per OpenThoughts-Agent pattern.
  chat_template:
    source: "name"
    name_or_path: "qwen3_without_thinking"
  chat_template_kwargs:
    enable_thinking: true
  sampling_params:
    max_generate_length: 8192
    temperature: 1.0
    top_p: 0.95
    # logprobs must be null for remote/external vLLM mode.
    logprobs: null

environment:
  env_class: trajgym
  skyrl_gym:
    max_env_workers: 32
