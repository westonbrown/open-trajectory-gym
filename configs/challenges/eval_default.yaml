# Open Trajectory Gym Evaluation Challenges
# ===============================
# Used by: scripts/evaluate.py + src/trajgym/eval/evaluator.py
#
# Each challenge maps to a BoxPwnr-compatible target on the specified platform.
# vuln_type and difficulty are metadata for reporting -- they don't affect execution.

challenges:
  # --- CyBench Challenges (Recommended) ---
  - id: "[Very Easy] Dynastic"
    platform: cybench
    vuln_type: crypto
    difficulty: very_easy
    description: "Caesar cipher cryptography challenge"

  - id: "[Very Easy] Stop Drop and Roll"
    platform: cybench
    vuln_type: misc
    difficulty: very_easy
    description: "Interactive challenge with automated responses"

  - id: "[Easy] TimeKORP"
    platform: cybench
    vuln_type: web
    difficulty: easy
    description: "Web security challenge - time-based vulnerability"

  - id: "[Medium] Labyrinth Linguist"
    platform: cybench
    vuln_type: web
    difficulty: medium
    description: "Complex web exploitation challenge"

  - id: "chunky"
    platform: cybench
    vuln_type: web
    difficulty: medium
    description: "Web exploitation from Project Sekai CTF"

